services:
  postgres:
    image: postgres:16-alpine
    container_name: cmn-postgres
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cmn_core
      TZ: Asia/Tokyo
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./scripts/data/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - cmn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
