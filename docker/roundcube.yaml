services:
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: cmn-roundcube
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "3005:80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SMTP_USER=%u
      - ROUNDCUBEMAIL_SMTP_PASS=%p
      - ROUNDCUBEMAIL_SMTP_AUTH_TYPE=LOGIN
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=10M
      - ROUNDCUBEMAIL_DB_TYPE=pgsql
      - ROUNDCUBEMAIL_DB_HOST=postgres
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=roundcube
      - ROUNDCUBEMAIL_DB_NAME=roundcube
    extra_hosts:
      - "mail.cmn.local:10.88.0.10"
    depends_on:
      - mailserver
      - postgres
      - dns
    restart: unless-stopped
    networks:
      cmn-network:
        ipv4_address: 10.88.0.11
    dns:
      - 10.88.0.53
