services:
  dns:
    image: strm/dnsmasq
    container_name: cmn-dns
    platform: linux/amd64
    ports:
      - "8053:8080"  # dnsmasq Web UI
    environment:
      - HTTP_USER=admin
      - HTTP_PASS=admin
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    command:
      - --address=/cmn.local/10.88.0.10
      - --address=/mail.cmn.local/10.88.0.10
      - --address=/roundcube.cmn.local/10.88.0.11
      - --mx-host=cmn.local,mail.cmn.local,10
      - --txt-record=cmn.local,v=spf1 mx a ip4:10.88.0.10 ~all
      - --txt-record=_dmarc.cmn.local,v=DMARC1; p=none; rua=mailto:dmarc@cmn.local
      - --host-record=10.88.0.10.in-addr.arpa,mail.cmn.local
      - --log-queries
      - --no-resolv
    networks:
      cmn-network:
        ipv4_address: 10.88.0.53

  # ---------------------------------------------------------------------------
  # PostgreSQL — single database for all services
  # Databases created on first init: cmn_core, keycloak, roundcube, casdoor
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cmn-postgres
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cmn_core
      TZ: Asia/Tokyo
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./scripts/data/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - cmn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # pgAdmin — web-based PostgreSQL administration UI
  # Admin console: http://localhost:3001
  # Login: admin@example.com / admin
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cmn-pgadmin
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "3001:80"
    networks:
      - cmn-network
    dns:
      - 10.88.0.53

  redis:
    image: redis:latest
    container_name: cmn-redis
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "6379:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "mysecretpassword", "--user", "default", "on", ">mysecretpassword", "+@all", "~*", "&*"]
    tmpfs:
      - /data
    networks:
      - cmn-network
    dns:
      - 10.88.0.53

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: cmn-swagger-ui
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "3002:8080"
    environment:
      - SWAGGER_JSON=/swagger/swagger.yaml
    volumes:
      - ./docs/swagger:/swagger:ro
    networks:
      - cmn-network
    dns:
      - 10.88.0.53

  godoc:
    image: golang:1.24
    container_name: cmn-godoc
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "3003:6060"
    volumes:
      - .:/go/src/github.com/ryo-arima/cmn-core:ro
    working_dir: /go/src/github.com/ryo-arima/cmn-core
    command: ["sh", "-c", "go install golang.org/x/tools/cmd/godoc@latest && godoc -http=:6060"]
    networks:
      - cmn-network
    dns:
      - 10.88.0.53

  localstack:
    image: localstack/localstack:latest
    container_name: cmn-localstack
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./scripts:/etc/localstack/init/ready.d
      - ./etc:/etc/localstack/init/etc:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cmn-network
    dns:
      - 10.88.0.53

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: cmn-mailserver
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    hostname: mail.cmn.local
    domainname: cmn.local
    environment:
      - OVERRIDE_HOSTNAME=mail.cmn.local
      - DOMAINNAME=cmn.local
      - ONE_DIR=0
      - SSL_TYPE=
      - TLS_LEVEL=
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - DMS_DEBUG=1
      - PERMIT_DOCKER=network
      - NETWORK_INTERFACE=eth0
      - SMTP_ONLY=0
      - ENABLE_POP3=0
      - ENABLE_SASLAUTHD=0
      - DOVECOT_INET_PROTOCOLS=ipv4
      - POSTFIX_MESSAGE_SIZE_LIMIT=10485760
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      - dns
    networks:
      cmn-network:
        ipv4_address: 10.88.0.10
    dns:
      - 10.88.0.53
    volumes:
      - ./scripts/data/mailserver:/tmp/docker-mailserver
    tmpfs:
      - /var/mail
      - /var/mail-state
      - /var/log/mail

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: cmn-roundcube
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "3005:80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SMTP_USER=%u
      - ROUNDCUBEMAIL_SMTP_PASS=%p
      - ROUNDCUBEMAIL_SMTP_AUTH_TYPE=LOGIN
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=10M
      - ROUNDCUBEMAIL_DB_TYPE=pgsql
      - ROUNDCUBEMAIL_DB_HOST=postgres
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=roundcube
      - ROUNDCUBEMAIL_DB_NAME=roundcube
    extra_hosts:
      - "mail.cmn.local:10.88.0.10"
    depends_on:
      - mailserver
      - postgres
      - dns
    restart: unless-stopped
    networks:
      cmn-network:
        ipv4_address: 10.88.0.11
    dns:
      - 10.88.0.53

  # ---------------------------------------------------------------------------
  # Keycloak — OIDC / SAML identity provider (development)
  # Admin console: http://localhost:8080
  # Credentials:   admin / admin
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cmn-keycloak
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./etc/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cmn-network
    dns:
      - 10.88.0.53
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Casdoor — OIDC / SAML identity provider (development)
  # Admin console:  http://localhost:9000
  # Built-in admin: admin / 123  (organization: built-in)
  # OIDC issuer:    http://localhost:9000
  # Client ID:      cmn-core-client-id
  # Client Secret:  cmn-core-client-secret
  # App users:      admin / admin, user01…user10 / Password123!  (organization: cmn)
  # ---------------------------------------------------------------------------
  casdoor:
    image: casbin/casdoor:latest
    container_name: cmn-casdoor
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    volumes:
      - ./etc/casdoor/app.conf:/conf/app.conf:ro
      - ./etc/casdoor/init_data.json:/init_data.json:ro
    ports:
      - "9000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cmn-network
    dns:
      - 10.88.0.53
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/.well-known/openid-configuration > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

networks:
  cmn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.0.0/24
          gateway: 10.88.0.1
